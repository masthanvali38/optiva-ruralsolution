<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Optiva</title>
    <script>
      // GitHub Pages SPA fallback: redirect 404s back to index.html
      // preserving the requested path so React Router can handle it.
      (function () {
        var segmentCount = 1; // number of path segments to keep as base (e.g. /optiva-ruralsolution/)
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
